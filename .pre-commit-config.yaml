repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: ruff check .
        language: system
        pass_filenames: false
        types: [python]
      - id: black
        name: black format
        entry: black .
        language: system
        pass_filenames: false
        types: [python]
      - id: pyright
        name: pyright
        entry: pyright
        language: system
        pass_filenames: false
        types: [python]
