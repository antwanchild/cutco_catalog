name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: "3.13"

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Testing & Quality Gates
#
# Runs on every PR targeting master and on push to master.
#
# Checks, roughly in order of speed:
#   1. lint       - Ruff, Black, and Pyright on the full tree
#   2. regression - bug-specific tests that should never come back
#   3. smoke      - small end-to-end checks for the CLI and key flows
#   4. imports    - import-safety checks for the import subset
#   5. perf       - full-suite timing to highlight slow tests
#   6. tests      - the main unit suite on Ubuntu and Windows
#   7. coverage   - repository coverage thresholds and report generation
#   8. security   - secret and filesystem vulnerability scanning
#
# The matrix jobs (`smoke`, `imports`, and `tests`) catch OS-specific
# regressions. The Windows runs are especially useful for import-path and
# platform-API mistakes that would never show up on Linux alone.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Black check
        run: black --check .

      - name: Pyright
        run: pyright

  # ── Regression ──────────────────────────────────────────────────────────
  # Keeps fixed bugs fixed. Naming conventions:
  #   test_regression_<slug>
  #   test_issue_<issue_number>_<slug>
  #   test_bug_<slug>
  # The job is bootstrap-friendly: if no such tests exist yet, unittest
  # exits with code 5 and the workflow passes with a notice.
  regression:
    name: Regression
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-regression-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-regression-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run regression tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -k regression -k issue_ -k bug_
          status=$?
          if [ $status -eq 5 ]; then
            echo "::notice::No regression tests found yet. Add tests with regression, issue_, or bug_ in the name."
            exit 0
          fi
          exit $status

  # ── Smoke ────────────────────────────────────────────────────────────────
  # Quick end-to-end checks that prove the CLI still boots and the common
  # happy-path flows still behave as expected.
  smoke:
    name: Smoke - ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Ubuntu
          - os: windows-latest
            label: Windows
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-smoke-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-smoke-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests
        run: python -m unittest discover -s tests -p 'test_smoke_*.py'

  # ── Imports ──────────────────────────────────────────────────────────────
  # Catches circular-import regressions and platform-only import failures.
  imports:
    name: Imports - ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Ubuntu
          - os: windows-latest
            label: Windows
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-imports-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-imports-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run import tests
        env:
          ADMIN_TOKEN: test-admin-token
          SECRET_KEY: test-secret-key
        run: python -m unittest discover -s tests -p 'test_smoke_import.py'

  # ── Perf ─────────────────────────────────────────────────────────────────
  # Shows the slowest tests so we can spot accidental performance cliffs.
  perf:
    name: Perf
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-perf-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-perf-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run performance timing
        env:
          ADMIN_TOKEN: test-admin-token
          SECRET_KEY: test-secret-key
        run: |
          python - <<'PY'
          import time
          import unittest

          timings = []

          class TimingResult(unittest.TextTestResult):
              def startTest(self, test):
                  self._started_at = time.perf_counter()
                  super().startTest(test)

              def stopTest(self, test):
                  timings.append((time.perf_counter() - self._started_at, test.id()))
                  super().stopTest(test)

          suite = unittest.defaultTestLoader.discover("tests")
          runner = unittest.TextTestRunner(verbosity=2, resultclass=TimingResult)
          result = runner.run(suite)

          print("\nSlowest tests:")
          for duration, test_id in sorted(timings, reverse=True)[:10]:
              print(f"{duration:0.3f}s {test_id}")

          raise SystemExit(0 if result.wasSuccessful() else 1)
          PY

  # ── Tests ────────────────────────────────────────────────────────────────
  # Main unit suite. This is the broad safety net for the codebase.
  tests:
    name: Tests - ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Ubuntu
          - os: windows-latest
            label: Windows
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-tests-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-tests-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          ADMIN_TOKEN: test-admin-token
          SECRET_KEY: test-secret-key
        run: python -m unittest discover -s tests

  # ── Coverage ─────────────────────────────────────────────────────────────
  # Generates the coverage report and enforces the repository threshold.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [tests, smoke]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-coverage-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-coverage-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt coverage

      - name: Run coverage
        env:
          ADMIN_TOKEN: test-admin-token
          SECRET_KEY: test-secret-key
        run: |
          coverage run -m unittest discover -s tests
          coverage xml -o coverage.xml
          coverage report \
            --include='app.py,blueprints/admin.py,constants.py,extensions.py,helpers.py,models.py,schema_migrations.py,startup.py' \
            --show-missing
          coverage report \
            --include='blueprints/catalog.py,blueprints/data.py,blueprints/logs.py,blueprints/people.py,blueprints/views.py' \
            --show-missing
          coverage report \
            --include='app.py,blueprints/admin.py,constants.py,extensions.py,helpers.py,models.py,schema_migrations.py,startup.py' \
            --fail-under=80 \
            --show-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Security scans ────────────────────────────────────────────────────────
  # Runs after the test and coverage jobs so it only evaluates trusted code.
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [tests, coverage, smoke, imports, regression, perf]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks - secret scan
        uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy - filesystem CVE scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
