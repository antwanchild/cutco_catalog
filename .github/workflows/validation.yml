name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Black check
        run: black --check .

      - name: Pyright
        run: pyright

  # ── Tests ────────────────────────────────────────────────────────────────
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run unit tests
        env:
          ADMIN_TOKEN: test-admin-token
          SECRET_KEY: test-secret-key
        run: python -m unittest discover -s tests

  # ── Coverage ─────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt coverage

      - name: Run coverage
        env:
          ADMIN_TOKEN: test-admin-token
          SECRET_KEY: test-secret-key
        run: |
          coverage run -m unittest discover -s tests
          coverage report \
            --include='app.py,blueprints/admin.py,constants.py,extensions.py,helpers.py,models.py,schema_migrations.py,startup.py' \
            --show-missing
          coverage report \
            --include='blueprints/catalog.py,blueprints/data.py,blueprints/logs.py,blueprints/people.py,blueprints/views.py' \
            --show-missing
          coverage report \
            --include='app.py,blueprints/admin.py,constants.py,extensions.py,helpers.py,models.py,schema_migrations.py,startup.py' \
            --fail-under=80 \
            --show-missing

  # ── Security scans ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [tests, coverage]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks - secret scan
        uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy - filesystem CVE scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
