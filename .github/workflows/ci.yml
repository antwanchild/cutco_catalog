name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

  # ── Security scans ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks – secret scan
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy – filesystem CVE scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  # ── Auto-tag (runs on master push, derives version from commit message) ───
  auto-tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    needs: security
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.version }}
      rerun: ${{ steps.tag.outputs.rerun }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version and push tag
        id: tag
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          LAST_TAG=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -1)
          LAST_TAG=${LAST_TAG:-v0.0.0}
          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if echo "$COMMIT_MSG" | grep -qiE '^feat!|BREAKING CHANGE'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMIT_MSG" | grep -qiE '^feat'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Tagging as ${NEW_TAG}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/${NEW_TAG}" >/dev/null; then
            TAG_COMMIT=$(git rev-list -n 1 "$NEW_TAG")
            if [ "$TAG_COMMIT" != "$(git rev-parse HEAD)" ]; then
              echo "Tag ${NEW_TAG} already exists on ${TAG_COMMIT}, refusing to retag a different commit." >&2
              exit 1
            fi
            echo "Tag ${NEW_TAG} already exists on this commit; skipping tag creation."
            echo "rerun=true" >> "$GITHUB_OUTPUT"
          else
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            echo "rerun=false" >> "$GITHUB_OUTPUT"
          fi

          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

  # ── Build & push (runs in same workflow as auto-tag, uses its outputs) ─────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: auto-tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.auto-tag.outputs.rerun != 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${{ needs.auto-tag.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}

      - name: Create GitHub release
        if: needs.auto-tag.outputs.rerun != 'true'
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ needs.auto-tag.outputs.new_tag }}
          name: ${{ needs.auto-tag.outputs.new_tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
