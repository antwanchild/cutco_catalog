name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

  # ── Security scans ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks – secret scan
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy – filesystem CVE scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  # ── Auto-tag (runs on master push, derives version from commit message) ───
  auto-tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    needs: security
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.version }}
      rerun: ${{ steps.tag.outputs.rerun }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version and push tag
        id: tag
        run: bash scripts/release_tag.sh

  # ── Build & push (runs in same workflow as auto-tag, uses its outputs) ─────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: auto-tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${{ needs.auto-tag.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: needs.auto-tag.outputs.rerun != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: docker_meta
        if: needs.auto-tag.outputs.rerun != 'true'
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build & push image
        if: needs.auto-tag.outputs.rerun != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            GIT_SHA=${{ github.sha }}

      - name: Check if GitHub release exists
        id: release_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.auto-tag.outputs.new_tag }}
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG")

          case "$STATUS" in
            200)
              echo "exists=true" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "exists=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Failed to check whether release ${RELEASE_TAG} exists (HTTP ${STATUS})." >&2
              exit 1
              ;;
          esac

      - name: Create GitHub release
        if: steps.release_check.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ needs.auto-tag.outputs.new_tag }}
          name: ${{ needs.auto-tag.outputs.new_tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summarize publish result
        run: |
          if [ "${{ needs.auto-tag.outputs.rerun }}" = "true" ]; then
            IMAGE_STATUS="skipped (rerun)"
          else
            IMAGE_STATUS="published"
          fi

          if [ "${{ steps.release_check.outputs.exists }}" = "true" ]; then
            RELEASE_STATUS="already existed"
          else
            RELEASE_STATUS="created"
          fi

          {
            echo "## Publish Result"
            echo ""
            echo "- Version: ${{ needs.auto-tag.outputs.version }}"
            echo "- Tag: ${{ needs.auto-tag.outputs.new_tag }}"
            echo "- Image: ${IMAGE_STATUS}"
            echo "- GitHub release: ${RELEASE_STATUS}"
          } >> "$GITHUB_STEP_SUMMARY"
