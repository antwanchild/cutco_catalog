name: CI

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Ruff check
        run: ruff check .

  # ── Tests ────────────────────────────────────────────────────────────────
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run unit tests
        env:
          ADMIN_TOKEN: test-admin-token
          SECRET_KEY: test-secret-key
        run: python -m unittest discover -s tests

  # ── Coverage ─────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt coverage

      - name: Run coverage
        env:
          ADMIN_TOKEN: test-admin-token
          SECRET_KEY: test-secret-key
        run: |
          coverage run -m unittest discover -s tests
          coverage report \
            --include='app.py,blueprints/admin.py,constants.py,extensions.py,helpers.py,models.py,schema_migrations.py,startup.py' \
            --show-missing
          coverage report \
            --include='blueprints/catalog.py,blueprints/data.py,blueprints/logs.py,blueprints/people.py,blueprints/views.py' \
            --show-missing
          coverage report \
            --include='app.py,blueprints/admin.py,constants.py,extensions.py,helpers.py,models.py,schema_migrations.py,startup.py' \
            --fail-under=80 \
            --show-missing

  # ── Security scans ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [tests, coverage]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks - secret scan
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy - filesystem CVE scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  # ── Auto-tag (runs on master push, derives version from commit message) ───
  auto-tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    needs: security
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version and push tag
        id: tag
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if echo "$COMMIT_MSG" | grep -qiE '^feat!|BREAKING CHANGE'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMIT_MSG" | grep -qiE '^feat'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Tagging as ${NEW_TAG}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

  # ── Build & push (runs in same workflow as auto-tag, uses its outputs) ─────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: auto-tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${{ needs.auto-tag.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ needs.auto-tag.outputs.new_tag }}
          name: ${{ needs.auto-tag.outputs.new_tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
