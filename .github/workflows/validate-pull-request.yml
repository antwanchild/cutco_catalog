name: Preview Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pr-validate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    name: Preview Gate
    runs-on: ubuntu-latest
    steps:
      - name: Summarize PR preview status
        uses: actions/github-script@v9
        with:
          script: |
            const requiredLabel = "docker";
            const labels = context.payload.pull_request.labels.map((label) => label.name);
            const hasLabel = labels.includes(requiredLabel);

            if (hasLabel) {
              core.notice(`PR #${context.payload.pull_request.number} is labeled '${requiredLabel}'. The preview image will build after CI passes.`);
            } else {
              core.notice(`PR #${context.payload.pull_request.number} does not yet have the '${requiredLabel}' label. Add it to enable the preview image.`);
            }

            await core.summary
              .addHeading("PR Preview Status")
              .addRaw(
                hasLabel
                  ? "This pull request is opted in for preview image builds."
                  : "Add the `docker` label to opt in to preview image builds."
              )
              .write();
