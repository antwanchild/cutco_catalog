name: Release

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Auto-tag (runs on master push, derives version from commit message) ───
  auto-tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version and push tag
        id: tag
        run: bash scripts/release_tag.sh

  # ── Build & push (runs in same workflow as auto-tag, uses its outputs) ─────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: auto-tag
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        run: echo "version=${{ needs.auto-tag.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            GIT_SHA=${{ github.sha }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ needs.auto-tag.outputs.new_tag }}
          name: ${{ needs.auto-tag.outputs.new_tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
