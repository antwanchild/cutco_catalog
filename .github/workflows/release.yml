name: Release

on:
  workflow_dispatch:
    inputs:
      repair_tag:
        description: "Existing release tag to rebuild, such as v1.105.0"
        required: false
        type: string
      repair_sha:
        description: "Commit SHA that the repair tag must reference"
        required: false
        type: string
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Auto-tag (runs on master push, derives version from commit message) ───
  auto-tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.version }}
      release_sha: ${{ steps.release_commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.repair_sha || github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version and push tag
        id: tag
        env:
          REPAIR_TAG: ${{ inputs.repair_tag }}
          REPAIR_SHA: ${{ inputs.repair_sha }}
        run: |
          if [[ -n "$REPAIR_TAG" || -n "$REPAIR_SHA" ]]; then
            if [[ -z "$REPAIR_TAG" || -z "$REPAIR_SHA" ]]; then
              echo "repair_tag and repair_sha must be provided together." >&2
              exit 1
            fi
            if [[ ! "$REPAIR_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "repair_tag must be a semantic version tag such as v1.105.0." >&2
              exit 1
            fi

            git fetch --force origin "refs/tags/${REPAIR_TAG}:refs/tags/${REPAIR_TAG}"
            TAG_SHA=$(git rev-parse "${REPAIR_TAG}^{commit}")
            HEAD_SHA=$(git rev-parse HEAD)
            if [[ "$TAG_SHA" != "$HEAD_SHA" || "$HEAD_SHA" != "$REPAIR_SHA" ]]; then
              echo "Repair target mismatch: tag=${TAG_SHA} checkout=${HEAD_SHA} requested=${REPAIR_SHA}" >&2
              exit 1
            fi

            {
              echo "new_tag=${REPAIR_TAG}"
              echo "version=${REPAIR_TAG#v}"
              echo "rerun=true"
            } >> "$GITHUB_OUTPUT"
            {
              echo "## Release Repair"
              echo ""
              echo "- Existing tag: ${REPAIR_TAG}"
              echo "- Verified commit: ${HEAD_SHA}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            bash scripts/release_tag.sh
          fi

      - name: Resolve release commit
        id: release_commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # ── Build & push (runs in same workflow as auto-tag, uses its outputs) ─────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: auto-tag
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.auto-tag.outputs.new_tag }}

      - name: Extract version from tag
        id: version
        run: echo "version=${{ needs.auto-tag.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            GIT_SHA=${{ needs.auto-tag.outputs.release_sha }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.auto-tag.outputs.new_tag }}
        run: |
          for attempt in 1 2 3 4 5; do
            if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              echo "Release ${RELEASE_TAG} already exists."
              exit 0
            fi

            if output=$(gh release create "$RELEASE_TAG" \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --generate-notes 2>&1); then
              echo "$output"
              exit 0
            fi

            if [[ "$output" == *"Release.tag_name already exists"* ]]; then
              echo "Release ${RELEASE_TAG} already exists."
              exit 0
            fi

            echo "Release API attempt ${attempt} failed: ${output}" >&2
            if [[ "$attempt" -lt 5 ]]; then
              sleep $((attempt * 5))
            fi
          done

          echo "Could not create or verify release ${RELEASE_TAG}." >&2
          exit 1
