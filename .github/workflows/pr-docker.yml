name: PR Docker Image

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, closed]

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/${{ github.repository }}

concurrency:
  group: pr-docker-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build PR Image
    runs-on: ubuntu-latest
    if: >
      github.event.action != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'docker')
    permissions:
      contents: read
      packages: write
      pull-requests: read
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Compute PR tags
        id: meta
        run: |
          echo "pr_tag=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          echo "version=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build PR image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.pr_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.head.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            GIT_SHA=${{ github.event.pull_request.head.sha }}

  cleanup:
    name: Remove PR Image
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    permissions:
      contents: read
      packages: write
    steps:
      - name: Delete GHCR version for this PR tag
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const packageName = context.repo.repo;
            const prTag = `pr-${context.payload.pull_request.number}`;
            const versions = await github.paginate(
              "GET /users/{username}/packages/container/{package_name}/versions",
              {
                username: owner,
                package_name: packageName,
                per_page: 100,
              }
            );

            const match = versions.find((version) => {
              const tags = version?.metadata?.container?.tags || [];
              return tags.includes(prTag);
            });

            if (!match) {
              core.info(`No GHCR version found for ${prTag}. Nothing to delete.`);
              return;
            }

            core.info(`Deleting GHCR version ${match.id} for ${prTag}.`);
            await github.request(
              "DELETE /users/{username}/packages/container/{package_name}/versions/{package_version_id}",
              {
                username: owner,
                package_name: packageName,
                package_version_id: match.id,
              }
            );
