              }
            }

            const canPush = pullRequest.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;

            core.setOutput("ready", "true");
            core.setOutput("pr_number", String(pullRequest.number));
            core.setOutput("head_sha", pullRequest.head.sha);
            core.setOutput("version", `pr-${pullRequest.number}`);
            core.setOutput("can_push", String(canPush));
            core.setOutput("preview_source", isWorkflowRun ? "workflow_run" : "pull_request");

      - name: Checkout PR head
        if: steps.meta.outputs.ready == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.meta.outputs.head_sha }}

      - name: Log in to GHCR
        if: steps.meta.outputs.ready == 'true' && steps.meta.outputs.can_push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build preview image
        if: steps.meta.outputs.ready == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ steps.meta.outputs.can_push == 'true' }}
          load: ${{ steps.meta.outputs.can_push != 'true' }}
          tags: |
            ${{ env.IMAGE_NAME }}:pr-${{ steps.meta.outputs.pr_number }}
            ${{ env.IMAGE_NAME }}:pr-${{ steps.meta.outputs.pr_number }}-${{ steps.meta.outputs.head_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.head_sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            GIT_SHA=${{ steps.meta.outputs.head_sha }}

  cleanup:
    name: Remove Preview Image
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    permissions:
      contents: read
      packages: write
    steps:
      - name: Delete preview image tag
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const packageName = context.repo.repo;
            const prTag = `pr-${context.payload.pull_request.number}`;
            const versions = await github.paginate(
              "GET /users/{username}/packages/container/{package_name}/versions",
              {
                username: owner,
                package_name: packageName,
                per_page: 100,
              }
            );

            const match = versions.find((version) => {
              const tags = version?.metadata?.container?.tags || [];
              return tags.includes(prTag);
            });

            if (!match) {
              core.info(`No GHCR version found for ${prTag}. Nothing to delete.`);
              return;
            }

            core.info(`Deleting GHCR version ${match.id} for ${prTag}.`);
            await github.request(
              "DELETE /users/{username}/packages/container/{package_name}/versions/{package_version_id}",
              {
                username: owner,
                package_name: packageName,
                package_version_id: match.id,
              }
            );
