name: PR Docker Image

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, closed]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/${{ github.repository }}

concurrency:
  group: pr-docker-${{ github.event.pull_request.number || github.event.workflow_run.head_sha || github.run_id }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Preview Build Gate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      pr_number: ${{ steps.decide.outputs.pr_number }}
      head_sha: ${{ steps.decide.outputs.head_sha }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - name: Decide whether to build
        id: decide
        uses: actions/github-script@v7
        with:
          script: |
            const requiredLabel = "docker";
            const workflowName = "CI";
            const skip = (reason) => {
              core.notice(reason);
              core.setOutput("should_build", "false");
              core.setOutput("pr_number", "");
              core.setOutput("head_sha", "");
              core.setOutput("version", "");
            };

            if (context.eventName === "workflow_run") {
              const workflowRun = context.payload.workflow_run;

              if (workflowRun.name !== workflowName) {
                skip(`Skipping because workflow '${workflowRun.name}' is not ${workflowName}.`);
                return;
              }

              if (workflowRun.event !== "pull_request") {
                skip(`Skipping because ${workflowName} run #${workflowRun.id} was not triggered by a pull request.`);
                return;
              }

              if (workflowRun.conclusion !== "success") {
                skip(`Skipping because ${workflowName} finished with conclusion '${workflowRun.conclusion}'.`);
                return;
              }

              const associatedPr = workflowRun.pull_requests?.[0];
              if (!associatedPr) {
                skip(`Skipping because ${workflowName} run #${workflowRun.id} is not associated with a pull request.`);
                return;
              }

              const labelsResponse = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: associatedPr.number,
                per_page: 100,
              });

              if (!labelsResponse.data.some((label) => label.name === requiredLabel)) {
                skip(`Skipping PR #${associatedPr.number} because it does not have the '${requiredLabel}' label.`);
                return;
              }

              core.notice(`Building preview image for PR #${associatedPr.number} at ${workflowRun.head_sha}.`);
              core.setOutput("should_build", "true");
              core.setOutput("pr_number", String(associatedPr.number));
              core.setOutput("head_sha", String(workflowRun.head_sha));
              core.setOutput("version", `pr-${associatedPr.number}`);
              return;
            } else {
              const pullRequest = context.payload.pull_request;
              const action = context.payload.action;

              if (action === "closed") {
                skip(`Skipping because PR #${pullRequest.number} is closed.`);
                return;
              }

              if (!pullRequest.labels.some((label) => label.name === requiredLabel)) {
                skip(`Skipping PR #${pullRequest.number} because it does not have the '${requiredLabel}' label yet.`);
                return;
              }

              const workflowRuns = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: pullRequest.head.sha,
                event: "pull_request",
                per_page: 100,
              });

              const ciFinished = workflowRuns.some(
                (run) => run.name === workflowName && run.conclusion === "success"
              );

              if (!ciFinished) {
                skip(`Skipping PR #${pullRequest.number} until ${workflowName} finishes successfully for ${pullRequest.head.sha}.`);
                return;
              }

              core.notice(`Building preview image for PR #${pullRequest.number} at ${pullRequest.head.sha}.`);
              core.setOutput("should_build", "true");
              core.setOutput("pr_number", String(pullRequest.number));
              core.setOutput("head_sha", String(pullRequest.head.sha));
              core.setOutput("version", `pr-${pullRequest.number}`);
            }

  build:
    name: Build PR Image
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write
      pull-requests: read
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Compute PR tags
        id: meta
        run: |
          echo "pr_tag=pr-${{ needs.prepare.outputs.pr_number }}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=pr-${{ needs.prepare.outputs.pr_number }}-${{ needs.prepare.outputs.head_sha }}" >> "$GITHUB_OUTPUT"
          echo "version=${{ needs.prepare.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build PR image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.pr_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.head_sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            GIT_SHA=${{ needs.prepare.outputs.head_sha }}

  cleanup:
    name: Remove PR Image
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    permissions:
      contents: read
      packages: write
    steps:
      - name: Delete GHCR version for this PR tag
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const packageName = context.repo.repo;
            const prTag = `pr-${context.payload.pull_request.number}`;
            const versions = await github.paginate(
              "GET /users/{username}/packages/container/{package_name}/versions",
              {
                username: owner,
                package_name: packageName,
                per_page: 100,
              }
            );

            const match = versions.find((version) => {
              const tags = version?.metadata?.container?.tags || [];
              return tags.includes(prTag);
            });

            if (!match) {
              core.info(`No GHCR version found for ${prTag}. Nothing to delete.`);
              return;
            }

            core.info(`Deleting GHCR version ${match.id} for ${prTag}.`);
            await github.request(
              "DELETE /users/{username}/packages/container/{package_name}/versions/{package_version_id}",
              {
                username: owner,
                package_name: packageName,
                package_version_id: match.id,
              }
            );
