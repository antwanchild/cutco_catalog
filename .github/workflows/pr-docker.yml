name: PR Docker Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/${{ github.repository }}

concurrency:
  group: pr-docker-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Preview Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: read
    steps:
      - name: Resolve PR context
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const requiredLabel = "docker";
            const pullRequest = context.payload.pull_request;

            if (!pullRequest) {
              core.setFailed("This preview event is not associated with a pull request.");
              return;
            }

            const prTagPrefix = `pr-${pullRequest.number}`;

            function escapeRegExp(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            const { data: currentPr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequest.number,
            });

            if (!currentPr.labels.some((label) => label.name === requiredLabel)) {
              core.info(`PR #${pullRequest.number} does not have the '${requiredLabel}' label. Skipping the image build.`);
              core.setOutput("ready", "false");
              return;
            }

            const canPush = pullRequest.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;
            let buildNumber = 1;

            try {
              const versions = await github.paginate(
                "GET /users/{username}/packages/container/{package_name}/versions",
                {
                  username: context.repo.owner,
                  package_name: context.repo.repo,
                  per_page: 100,
                }
              );
              const buildPattern = new RegExp(`^${escapeRegExp(prTagPrefix)}\\.(\\d+)(?:$|-)`);
              for (const version of versions) {
                const tags = version?.metadata?.container?.tags || [];
                for (const tag of tags) {
                  const match = tag.match(buildPattern);
                  if (match) {
                    buildNumber = Math.max(buildNumber, Number(match[1]) + 1);
                  }
                }
              }
            } catch (error) {
              core.warning(
                `Could not determine the next preview build number for ${prTagPrefix}; defaulting to build #1. ${String(error)}`
              );
            }

            const buildTag = `${prTagPrefix}.${buildNumber}`;
            const shaTag = `${buildTag}-${pullRequest.head.sha}`;

            core.setOutput("ready", "true");
            core.setOutput("pr_number", String(pullRequest.number));
            core.setOutput("head_sha", pullRequest.head.sha);
            core.setOutput("build_number", String(buildNumber));
            core.setOutput("version", buildTag);
            core.setOutput("pr_tag", prTagPrefix);
            core.setOutput("build_tag", buildTag);
            core.setOutput("sha_tag", shaTag);
            core.setOutput("can_push", String(canPush));

      - name: Checkout PR head
        if: steps.meta.outputs.ready == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.meta.outputs.head_sha }}

      - name: Log in to GHCR
        if: steps.meta.outputs.ready == 'true' && steps.meta.outputs.can_push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build preview image
        if: steps.meta.outputs.ready == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ steps.meta.outputs.can_push == 'true' }}
          load: ${{ steps.meta.outputs.can_push != 'true' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.pr_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.build_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.head_sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            GIT_SHA=${{ steps.meta.outputs.head_sha }}

  cleanup:
    name: Remove Preview Image
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_target' && github.event.action == 'closed' && github.event.pull_request.merged == true
      || github.event_name == 'pull_request' && github.event.action == 'unlabeled'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Delete preview image tag
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const packageName = context.repo.repo;
            const prTagPrefix = `pr-${context.payload.pull_request.number}`;
            const versions = await github.paginate(
              "GET /users/{username}/packages/container/{package_name}/versions",
              {
                username: owner,
                package_name: packageName,
                per_page: 100,
              }
            );

            const matches = versions.filter((version) => {
              const tags = version?.metadata?.container?.tags || [];
              return tags.some((tag) => tag === prTagPrefix || tag.startsWith(`${prTagPrefix}.`) || tag.startsWith(`${prTagPrefix}-`));
            });

            if (!matches.length) {
              core.info(`No GHCR versions found for ${prTagPrefix}. Nothing to delete.`);
              return;
            }

            for (const match of matches) {
              core.info(`Deleting GHCR version ${match.id} for ${prTagPrefix}.`);
              await github.request(
                "DELETE /users/{username}/packages/container/{package_name}/versions/{package_version_id}",
                {
                  username: owner,
                  package_name: packageName,
                  package_version_id: match.id,
                }
              );
            }
