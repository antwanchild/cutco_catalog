name: PR Docker Preview

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/${{ github.repository }}

concurrency:
  group: pr-docker-${{ github.event.workflow_run.head_sha || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Preview Image
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' || github.event_name == 'pull_request'
    permissions:
      actions: read
      contents: read
      packages: write
      pull-requests: read
    steps:
      - name: Resolve PR context
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const requiredLabel = "docker";
            const isWorkflowRun = context.eventName === "workflow_run";
            const workflowRun = isWorkflowRun ? context.payload.workflow_run : null;
            const pullRequest = isWorkflowRun
              ? workflowRun.pull_requests?.[0]
              : context.payload.pull_request;

            if (!pullRequest) {
              core.setFailed("This preview event is not associated with a pull request.");
              return;
            }

            const { data: currentPr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequest.number,
            });

            if (!currentPr.labels.some((label) => label.name === requiredLabel)) {
              core.info(`PR #${pullRequest.number} does not have the '${requiredLabel}' label. Skipping the image build.`);
              core.setOutput("ready", "false");
              return;
            }

            if (!isWorkflowRun) {
              const { data: workflows } = await github.rest.actions.listRepoWorkflows({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              const ciWorkflow = workflows.workflows.find((workflow) => workflow.name === "CI");

              if (!ciWorkflow) {
                core.setFailed("Could not find the CI workflow.");
                return;
