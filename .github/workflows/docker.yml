name: Build & Push Image

on:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "requirements.txt"
      - "Dockerfile"
      - "VERSION"
      - "templates/**"
      - "static/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(cat VERSION)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          MSG="${{ github.event.head_commit.message }}"

          if echo "$MSG" | grep -qE '^feat!:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            BUMP_TYPE="major"
          elif echo "$MSG" | grep -qE '^feat:'; then
            MINOR=$((MINOR + 1)); PATCH=0
            BUMP_TYPE="minor"
          elif echo "$MSG" | grep -qE '^fix:'; then
            PATCH=$((PATCH + 1))
            BUMP_TYPE="patch"
          else
            echo "No version bump needed for this commit."
            echo "new_version=$CURRENT" >> $GITHUB_OUTPUT
            exit 0
          fi

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW" > VERSION
          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumped $BUMP_TYPE: $CURRENT → $NEW"

      - name: Commit version bump
        if: steps.bump.outputs.new_version != ''
        run: |
          CURRENT=$(git show HEAD:VERSION 2>/dev/null || echo "")
          NEW=$(cat VERSION)
          if [ "$CURRENT" = "$NEW" ]; then
            echo "Version unchanged, skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to $NEW [skip ci]"
          git push

  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main   # pick up the version bump commit

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
