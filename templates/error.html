{% extends "base.html" %}
{% block title %}{{ code }} – Cutco Vault{% endblock %}
{% block content %}
<div class="form-card centered" style="text-align:center;max-width:480px;margin:4rem auto">
  <div style="font-size:3rem;margin-bottom:.5rem">{{ icon }}</div>
  <h1 class="page-title" style="justify-content:center">{{ code }}</h1>
  <p class="muted" style="margin:.75rem 0 1.5rem">{{ message }}</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
