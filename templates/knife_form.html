{% extends "base.html" %}
{% block title %}{{ action }} Knife – Cutco Vault{% endblock %}
{% block content %}
<div class="form-container">
  <div class="form-header">
    <h2 class="form-title">{{ action }} Knife</h2>
    <a href="{{ url_for('catalog') }}" class="btn btn-ghost btn-sm">← Back</a>
  </div>
  <form method="POST" class="knife-form">
    <div class="field-group"><label>Model Name <span class="required">*</span></label>
      <input type="text" name="model_name" required placeholder="e.g. Super Shears" value="{{ knife.model_name if knife else '' }}"></div>
    <div class="field-row">
      <div class="field-group"><label>SKU / Catalog #</label>
        <input type="text" name="sku" placeholder="e.g. 1720" value="{{ knife.sku if knife and knife.sku else '' }}"></div>
      <div class="field-group"><label>Category</label>
        <select name="category">{% for c in categories %}<option value="{{ c }}" {% if (knife and knife.category==c) or (not knife and c=='Kitchen') %}selected{% endif %}>{{ c }}</option>{% endfor %}</select></div>
    </div>
    <div class="field-group"><label>Edge Type</label>
      <select name="edge_type">{% for e in edge_types %}<option value="{{ e }}" {% if knife and knife.edge_type==e %}selected{% endif %}>{{ e }}</option>{% endfor %}</select></div>
    <div class="field-row">
      <div class="field-group field-toggle">
        <label class="toggle-label"><input type="checkbox" name="is_unicorn" {% if knife and knife.is_unicorn %}checked{% endif %}>
          <span class="toggle-track"><span class="toggle-thumb"></span></span><span>🦄 Unicorn / Discontinued</span></label></div>
      <div class="field-group field-toggle">
        <label class="toggle-label"><input type="checkbox" name="in_catalog" {% if not knife or knife.in_catalog %}checked{% endif %}>
          <span class="toggle-track"><span class="toggle-thumb"></span></span><span>In Current Catalog</span></label></div>
    </div>
    <div class="field-group"><label>Notes</label>
      <textarea name="notes" rows="2" placeholder="Condition, provenance, etc.">{{ knife.notes if knife and knife.notes else '' }}</textarea></div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary btn-lg">{{ action }} Knife</button>
      <a href="{{ url_for('catalog') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
