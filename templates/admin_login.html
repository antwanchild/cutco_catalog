{% extends "base.html" %}
{% block title %}Admin Login – Cutco Vault{% endblock %}
{% block content %}
<div class="form-card centered">
  <h1 class="page-title">Admin Login</h1>
  <form method="post">
    <label>Token
      <input type="password" name="token" autofocus required class="input-full">
    </label>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Login</button>
      <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
