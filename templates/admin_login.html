{% extends "base.html" %}
{% block title %}Admin Login – Cutco Vault{% endblock %}
{% block content %}
<div class="form-card centered">
  <h1 class="page-title">Admin Login</h1>
  <form method="post">
    <label>Token
      <div style="position:relative;display:flex;align-items:center">
        <input type="password" name="token" id="token-input" autofocus required class="input-full" style="padding-right:2.5rem">
        <button type="button" id="toggle-token" aria-label="Show/hide token"
                style="position:absolute;right:.5rem;background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:0;line-height:1">👁</button>
      </div>
    </label>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Login</button>
      <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
<script>
  document.getElementById('toggle-token').addEventListener('click', function() {
    var inp = document.getElementById('token-input');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    this.textContent = inp.type === 'password' ? '👁' : '🙈';
  });
</script>
{% endblock %}
