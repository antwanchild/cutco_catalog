{% extends "base.html" %}
{% block title %}{{ action }} Collector – Cutco Vault{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ action }} Collector</h1>
  <a href="{{ url_for('people') }}" class="btn btn-ghost">← People</a>
</div>
<form method="post" class="form-card">
  <label>Name *
    <input type="text" name="name" value="{{ person.name if person else '' }}" required class="input-full">
  </label>
  <label>Notes
    <textarea name="notes" rows="2" class="input-full">{{ person.notes if person and person.notes else '' }}</textarea>
  </label>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">{{ action }}</button>
    <a href="{{ url_for('people') }}" class="btn btn-ghost">Cancel</a>
  </div>
</form>
{% endblock %}
