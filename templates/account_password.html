{% extends "base.html" %}
{% block title %}Change Password – Cutco Vault{% endblock %}
{% block content %}
<div class="detail-section auth-card centered">
  <h1 class="page-title">Change Password</h1>
  <p class="muted">Signed in as <strong>{{ user.label }}</strong>. Changing your password revokes your other sessions.</p>

  <form method="post" class="form-card compact mt-sm">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Current password
      <input type="password" name="current_password" autocomplete="current-password" autofocus required class="input-full">
    </label>
    <label>New password
      <input type="password" name="new_password" autocomplete="new-password" required minlength="12" class="input-full">
    </label>
    <label>Confirm new password
      <input type="password" name="password_confirm" autocomplete="new-password" required minlength="12" class="input-full">
    </label>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Change password</button>
      <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
