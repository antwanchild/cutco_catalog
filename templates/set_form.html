{% extends "base.html" %}
{% block title %}{{ action }} Set – Cutco Vault{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ action }} Set</h1>
  <a href="{{ url_for('sets_list') }}" class="btn btn-ghost">← Sets</a>
</div>

<form method="post" class="form-card">
  <label>Set Name *
    <input type="text" name="name" value="{{ set.name if set else '' }}" required class="input-full">
  </label>
  <label>Notes
    <textarea name="notes" rows="2" class="input-full">{{ set.notes if set and set.notes else '' }}</textarea>
  </label>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">{{ action }} Set</button>
    <a href="{{ url_for('sets_list') }}" class="btn btn-ghost">Cancel</a>
  </div>
</form>
{% endblock %}
