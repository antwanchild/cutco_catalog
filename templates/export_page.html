{% extends "base.html" %}
{% block title %}Export CSV – Cutco Vault{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">📤 Export Collection CSV</h1>
  <a href="{{ url_for('index') }}" class="btn btn-ghost">← Home</a>
</div>

<form method="get" action="{{ url_for('data.export_csv') }}" class="form-card" style="max-width:640px">
  <label>File name
    <input type="text" name="filename" value="{{ suggested_name }}" class="input-full">
    <span class="hint">`.csv` is added automatically if missing.</span>
  </label>

  <p class="hint">
    Save location is chosen by your browser (download folder or Save As prompt).
  </p>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Download CSV</button>
  </div>
</form>
{% endblock %}
